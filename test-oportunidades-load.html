<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Test: Carga de Oportunidades</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #f5f5f5; }
        .test { margin: 20px 0; padding: 15px; background: white; border-left: 4px solid #4ECDC4; }
        .test h3 { margin: 0 0 10px 0; color: #4ECDC4; }
        .log { margin: 5px 0; padding: 5px; background: #f0f0f0; font-size: 12px; }
        .error { border-left-color: #ff6b6b; }
        .success { border-left-color: #51cf66; }
        .pending { border-left-color: #ffa94d; }
    </style>
</head>
<body>
    <h1>🔍 Test: Sistema de Carga de Oportunidades</h1>
    
    <div class="test pending" id="test-config">
        <h3>1. Config.js Cargado</h3>
        <div class="log" id="config-status">Esperando...</div>
    </div>
    
    <div class="test pending" id="test-backend">
        <h3>2. Backend Disponible (Puerto 5001)</h3>
        <div class="log" id="backend-status">Esperando...</div>
    </div>
    
    <div class="test pending" id="test-main">
        <h3>3. Main.js Cargado</h3>
        <div class="log" id="main-status">Esperando...</div>
    </div>
    
    <div class="test pending" id="test-carrito">
        <h3>4. Carrito-global.js Cargado</h3>
        <div class="log" id="carrito-status">Esperando...</div>
    </div>
    
    <div class="test pending" id="test-oportunidades">
        <h3>5. Oportunidades Cargadas</h3>
        <div class="log" id="oportunidades-status">Esperando...</div>
    </div>
    
    <div class="test pending" id="test-variables">
        <h3>6. Variables Globales</h3>
        <div class="log" id="variables-status">Esperando...</div>
    </div>

    <!-- Cargar config primero (obligatorio) -->
    <script src="js/config.js"></script>
    
    <script>
        const logs = [];
        
        function log(testId, message, type = 'info') {
            const el = document.getElementById(testId);
            const logEl = document.getElementById(testId.replace('-', '-').replace('test-', '') + '-status');
            if (logEl) {
                logEl.innerHTML += `<div class="log">${message}</div>`;
            }
            console.log(`[${testId}] ${message}`);
        }
        
        function updateTest(testId, status) {
            const el = document.getElementById(testId);
            el.classList.remove('pending', 'error', 'success');
            el.classList.add(status === 'success' ? 'success' : status === 'error' ? 'error' : 'pending');
        }
        
        // Test 1: Config
        if (window.rifaplusConfig) {
            log('test-config', '✅ window.rifaplusConfig existe');
            log('test-config', `   Backend: ${window.rifaplusConfig.backend?.apiBase}`);
            updateTest('test-config', 'success');
        } else {
            log('test-config', '❌ window.rifaplusConfig NO EXISTE', 'error');
            updateTest('test-config', 'error');
        }
        
        // Test 2: Backend disponible
        fetch(window.rifaplusConfig?.backend?.apiBase + '/api/public/oportunidades/disponibles', {
            method: 'GET',
            headers: { 'Accept': 'application/json' }
        }).then(r => {
            if (r.ok) {
                log('test-backend', '✅ Endpoint /api/public/oportunidades/disponibles responde');
                updateTest('test-backend', 'success');
                return r.json();
            } else {
                log('test-backend', `❌ Error: ${r.status} ${r.statusText}`, 'error');
                updateTest('test-backend', 'error');
                throw new Error(r.status);
            }
        }).then(data => {
            log('test-backend', `   Cantidad: ${data.cantidad} disponibles`);
            log('test-backend', `   Rango: ${data.rango?.inicio} - ${data.rango?.fin}`);
        }).catch(e => {
            log('test-backend', `❌ Error conectando: ${e.message}`, 'error');
            updateTest('test-backend', 'error');
        });
        
        // (Los tests 3-6 necesitan que main.js y carrito-global.js carguen)
        console.log('✅ Tests básicos iniciados. Cargando scripts...');
    </script>
    
    <!-- Después cargar main.js (que carga oportunidades) -->
    <script src="js/main.js"></script>
    
    <!-- Después cargar carrito-global.js (que escucha evento) -->
    <script src="js/carrito-global.js"></script>
    
    <!-- Tests finales después de que todo está cargado -->
    <script>
        setTimeout(() => {
            // Test 3: main.js
            if (window.cargarOportunidadesDisponibles || document.currentScript) {
                log('test-main', '✅ main.js cargado');
                updateTest('test-main', 'success');
            }
            
            // Test 4: carrito-global.js
            if (window.actualizarVistaCarritoGlobal) {
                log('test-carrito', '✅ carrito-global.js cargado');
                updateTest('test-carrito', 'success');
            }
            
            // Test 5: Oportunidades
            if (window.rifaplusOportunidadesLoaded) {
                log('test-oportunidades', '✅ Oportunidades cargadas');
                log('test-oportunidades', `   Cantidad: ${window.rifaplusOportunidadesDisponibles?.length || 0}`);
                updateTest('test-oportunidades', 'success');
            } else {
                log('test-oportunidades', '⏳ Aún no cargadas (esperando...)', 'pending');
            }
            
            // Test 6: Variables globales
            const vars = {
                'rifaplusOportunidadesLoaded': window.rifaplusOportunidadesLoaded,
                'rifaplusOportunidadesDisponibles.length': window.rifaplusOportunidadesDisponibles?.length,
                'rifaplusConfig.backend.apiBase': window.rifaplusConfig?.backend?.apiBase
            };
            Object.entries(vars).forEach(([key, val]) => {
                log('test-variables', `   ${key}: ${val}`);
            });
            updateTest('test-variables', 'success');
            
        }, 2000);
        
        // Escuchar evento de oportunidades
        window.addEventListener('oportunidadesListas', function(e) {
            log('test-oportunidades', `✅ ¡EVENTO RECIBIDO! Detail: ${JSON.stringify(e.detail)}`);
            updateTest('test-oportunidades', 'success');
        });
    </script>
</body>
</html>
