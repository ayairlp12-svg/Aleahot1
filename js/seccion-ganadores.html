<!-- SECCIÓN GANADORES - Se muestra solo si hay ganadores registrados -->
<section class="seccion-ganadores" id="seccionGanadores" style="display: none;">
    <div class="container">
        <div class="ganadores-header">
            <h3 class="ganadores-titulo">🏆 Ganadores Registrados</h3>
            <p class="ganadores-subtitulo">Aquí aparecerán los ganadores de la rifa conforme se vayan registrando</p>
        </div>

        <div class="ganadores-contenedor" id="ganadesoresContenedor">
            <!-- Se genera dinámicamente -->
        </div>
    </div>
</section>

<style>
    /* SECCIÓN GANADORES */
    .seccion-ganadores {
        padding: 3rem 0;
        background: linear-gradient(135deg, #F9FAFB 0%, #F3F4F6 100%);
        border-top: 1px solid var(--border-color);
        border-bottom: 1px solid var(--border-color);
    }

    .ganadores-header {
        text-align: center;
        margin-bottom: 3rem;
    }

    .ganadores-titulo {
        font-size: 2rem;
        font-weight: 700;
        color: var(--text-dark);
        margin-bottom: 0.5rem;
    }

    .ganadores-subtitulo {
        font-size: 1rem;
        color: var(--text-light);
        margin: 0;
    }

    .ganadores-contenedor {
        display: grid;
        gap: 2rem;
    }

    /* Sección por tipo de ganador */
    .ganador-tipo-seccion {
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        overflow: hidden;
        border-left: 4px solid var(--primary);
    }

    .ganador-tipo-header {
        background: linear-gradient(135deg, rgba(15, 58, 125, 0.1) 0%, rgba(15, 58, 125, 0.05) 100%);
        padding: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 1rem;
    }

    .ganador-tipo-icono {
        font-size: 2rem;
    }

    .ganador-tipo-titulo {
        flex: 1;
        font-weight: 700;
        color: var(--primary);
        font-size: 1.25rem;
        margin: 0;
    }

    .ganador-tipo-contador {
        background: white;
        padding: 0.5rem 1rem;
        border-radius: var(--radius-full);
        font-weight: 600;
        color: var(--primary);
        font-size: 0.9rem;
    }

    .ganadores-lista {
        padding: 1.5rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
    }

    /* Tarjeta individual de ganador */
    .ganador-card {
        background: linear-gradient(135deg, #FAFAFA 0%, #F3F4F6 100%);
        border: 2px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 1.5rem;
        text-align: center;
        transition: all var(--transition-fast);
        animation: slideInUp 0.5s ease-out both;
    }

    .ganador-card:hover {
        border-color: var(--primary);
        box-shadow: 0 8px 25px rgba(15, 58, 125, 0.2);
        transform: translateY(-4px);
    }

    .ganador-posicion {
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--primary);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
    }

    .ganador-numero {
        font-size: 2.5rem;
        font-weight: 900;
        color: var(--primary);
        font-family: 'Courier New', monospace;
        margin: 0.5rem 0;
        line-height: 1;
    }

    .ganador-tipo-badge {
        display: inline-block;
        padding: 0.4rem 0.8rem;
        background: rgba(15, 58, 125, 0.1);
        color: var(--primary);
        border-radius: var(--radius-full);
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 0.5rem;
    }

    /* Animación de entrada */
    @keyframes slideInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Responsive */
    @media (max-width: 768px) {
        .seccion-ganadores {
            padding: 2.5rem 0;
        }

        .ganadores-header {
            margin-bottom: 2.5rem;
        }

        .ganadores-titulo {
            font-size: 1.75rem;
        }

        .ganadores-subtitulo {
            font-size: 0.95rem;
        }

        .ganador-tipo-header {
            flex-direction: column;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .ganador-tipo-titulo {
            font-size: 1.1rem;
        }

        .ganadores-lista {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            padding: 1rem;
        }

        .ganador-numero {
            font-size: 2rem;
        }
    }

    @media (max-width: 480px) {
        .seccion-ganadores {
            padding: 2rem 0;
        }

        .ganadores-header {
            margin-bottom: 2rem;
        }

        .ganadores-titulo {
            font-size: 1.5rem;
        }

        .ganadores-subtitulo {
            font-size: 0.9rem;
        }

        .ganador-tipo-seccion {
            border-left-width: 3px;
        }

        .ganador-tipo-header {
            padding: 1rem;
        }

        .ganador-tipo-icono {
            font-size: 1.75rem;
        }

        .ganador-tipo-titulo {
            font-size: 1rem;
        }

        .ganadores-lista {
            grid-template-columns: 1fr;
            padding: 1rem;
        }

        .ganador-card {
            padding: 1.25rem;
        }

        .ganador-numero {
            font-size: 1.75rem;
        }

        .ganador-tipo-contador {
            font-size: 0.85rem;
            padding: 0.4rem 0.75rem;
        }
    }
</style>

<script>
    /**
     * Renderizar sección de ganadores dinámicamente
     */
    function renderizarSeccionGanadores() {
        const seccion = document.getElementById('seccionGanadores');
        const contenedor = document.getElementById('ganadesoresContenedor');

        if (!seccion || !contenedor) return;

        // Fuente de verdad: servidor
        (async () => {
            try {
                const res = await fetch('http://localhost:5001/api/ganadores?limit=200');
                if (!res.ok) throw new Error('no_server');
                const payload = await res.json();
                const rows = payload && payload.data ? payload.data : [];

                if (!Array.isArray(rows) || rows.length === 0) {
                    seccion.style.display = 'none';
                    console.log('[SeccionGanadores] No hay ganadores en servidor — sección oculta');
                    return;
                }

                // Mapear rows a estructura esperada por el renderizado
                const mapped = { sorteo: [], presorteo: [], ruletazos: [] };
                const meta = {
                    sorteo: { etiqueta: 'Sorteo', icono: '🎟️' },
                    presorteo: { etiqueta: 'Pre-sorteo', icono: '🔔' },
                    ruletazos: { etiqueta: 'Ruletazos', icono: '🎲' }
                };

                rows.forEach((r, idx) =&gt; {
                    const tipoRaw = (r.tipo_ganador || '').toString().toLowerCase();
                    let key = 'sorteo';
                    if (tipoRaw.includes('presorte')) key = 'presorteo';
                    else if (tipoRaw.includes('rulet')) key = 'ruletazos';

                    const numero = r.numero_boleto || r.numero_orden || '';
                    mapped[key].push({
                        numero: String(numero),
                        numeroFormateado: String(numero),
                        posicion: r.posicion || (idx + 1),
                        etiqueta: meta[key].etiqueta,
                        icono: meta[key].icono,
                        raw: r
                    });
                });

                // Contar totales
                const total = mapped.sorteo.length + mapped.presorteo.length + mapped.ruletazos.length;
                if (total === 0) {
                    seccion.style.display = 'none';
                    return;
                }

                // Renderizar
                seccion.style.display = 'block';
                contenedor.innerHTML = '';
                for (const tipo in mapped) {
                    const ganadesores = mapped[tipo];
                    if (!ganadesores || ganadesores.length === 0) continue;

                    const tipoSeccion = document.createElement('div');
                    tipoSeccion.className = 'ganador-tipo-seccion';
                    tipoSeccion.innerHTML = `
                        <div class="ganador-tipo-header">
                            <span class="ganador-tipo-icono">${ganadesores[0].icono}</span>
                            <h4 class="ganador-tipo-titulo">${ganadesores[0].etiqueta}</h4>
                            <span class="ganador-tipo-contador">${ganadesores.length} ganador${ganadesores.length > 1 ? 'es' : ''}</span>
                        </div>
                        <div class="ganadores-lista">
                            ${ganadesores.map((g) => `
                                <div class="ganador-card">
                                    <div class="ganador-posicion">Posición ${g.posicion}</div>
                                    <div class="ganador-numero">${g.numeroFormateado}</div>
                                    <div class="ganador-tipo-badge">${g.etiqueta}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;

                    contenedor.appendChild(tipoSeccion);
                }
            } catch (e) {
                // Fallback: usar GanadoresManager local (no recomendado)
                console.warn('[SeccionGanadores] Error fetching ganadores from server, usando localStorage como fallback', e);
                const ganadesoresFormateados = window.GanadoresManager ? window.GanadoresManager.obtenerFormateados() : null;
                if (ganadesoresFormateados) {
                    // Reutilizar render lógica anterior (simple)
                    const totalLocal = ['sorteo', 'presorteo', 'ruletazos'].reduce((acc, k) =&gt; acc + ((ganadesoresFormateados[k]||[]).length), 0);
                    if (totalLocal > 0) {
                        seccion.style.display = 'block';
                        contenedor.innerHTML = '';
                        for (const tipo in ganadesoresFormateados) {
                            const ganadesores = ganadesoresFormateados[tipo];
                            if (!ganadesores || ganadesores.length === 0) continue;
                            const tipoSeccion = document.createElement('div');
                            tipoSeccion.className = 'ganador-tipo-seccion';
                            tipoSeccion.innerHTML = `
                                <div class="ganador-tipo-header">
                                    <span class="ganador-tipo-icono">${ganadesores[0].icono}</span>
                                    <h4 class="ganador-tipo-titulo">${ganadesores[0].etiqueta}</h4>
                                    <span class="ganador-tipo-contador">${ganadesores.length} ganador${ganadesores.length > 1 ? 'es' : ''}</span>
                                </div>
                                <div class="ganadores-lista">
                                    ${ganadesores.map((g) => `
                                        <div class="ganador-card">
                                            <div class="ganador-posicion">Posición ${g.posicion}</div>
                                            <div class="ganador-numero">${g.numeroFormateado}</div>
                                            <div class="ganador-tipo-badge">${g.etiqueta || tipo}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            `;
                            contenedor.appendChild(tipoSeccion);
                        }
                    } else {
                        seccion.style.display = 'none';
                    }
                } else {
                    seccion.style.display = 'none';
                }
            }
        })();
    }

    // Inicializar cuando el DOM esté listo
    document.addEventListener('DOMContentLoaded', function() {
        // Renderizar ganadores iniciales
        if (window.GanadoresManager) {
            renderizarSeccionGanadores();
        }
    });

    // Escuchar cambios en ganadores
    if (window) {
        window.addEventListener('ganadesoresActualizados', function() {
            renderizarSeccionGanadores();
        });
    }
</script>
