<!-- MODAL SELECCIONAR TIPO DE GANADOR -->
<div class="modal modal-overlay" id="modalSeleccionarGanador">
    <div class="modal-content modal-ganador">
        <div class="modal-header modal-header-center">
            <h2>🏆 ¿Qué tipo de ganador es?</h2>
            <button class="modal-close" id="closeModalGanador" aria-label="Cerrar">×</button>
        </div>
        
        <div class="modal-body">
            <div id="ganadesoresInfo" style="margin-bottom: 1.5rem; padding: 1rem; background: rgba(124, 58, 237, 0.1); border-radius: var(--radius-md);">
                <p style="margin: 0; font-weight: 600; color: var(--text-dark);">
                    Boleto: <span id="ganadesoresNumero" style="color: var(--primary); font-size: 1.2rem;">-</span>
                </p>
            </div>

            <div id="tiposGanadores" class="tipos-ganadores-grid" style="display: grid; gap: 1rem;">
                <!-- Se genera dinámicamente con JavaScript -->
            </div>
        </div>

        <div class="modal-footer modal-footer-ganador">
            <button class="btn btn-outline" id="btnCancelarGanador">Cancelar</button>
        </div>
    </div>
</div>

<style>
    .modal-ganador {
        max-width: 500px;
    }

    .tipos-ganadores-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 1rem;
    }

    .tipo-ganador-card {
        padding: 1.25rem;
        border: 2px solid var(--border-color);
        border-radius: var(--radius-md);
        cursor: pointer;
        transition: all var(--transition-fast);
        text-align: center;
        background: white;
    }

    .tipo-ganador-card:hover {
        border-color: var(--primary);
        background: rgba(124, 58, 237, 0.05);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(124, 58, 237, 0.15);
    }

    .tipo-ganador-card.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        pointer-events: none;
    }

    .tipo-ganador-icono {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
        display: block;
    }

    .tipo-ganador-nombre {
        font-weight: 700;
        color: var(--text-dark);
        font-size: 0.95rem;
        margin-bottom: 0.25rem;
    }

    .tipo-ganador-contador {
        font-size: 0.8rem;
        color: var(--text-light);
    }

    .tipo-ganador-contador span {
        color: var(--primary);
        font-weight: 600;
    }

    @media (max-width: 480px) {
        .tipos-ganadores-grid {
            grid-template-columns: 1fr;
        }

        .tipo-ganador-card {
            padding: 1rem;
        }

        .tipo-ganador-icono {
            font-size: 2rem;
        }

        .tipo-ganador-nombre {
            font-size: 0.9rem;
        }
    }
</style>

<script>
    // Variables globales del modal
    let ganadesoresModalNumero = null;
    let ganadesoresModalCallback = null;

    /**
     * Abrir modal para seleccionar tipo de ganador
     * @param {String|Number} numero - Número del boleto ganador
     * @param {Function} callback - Función a ejecutar cuando se selecciona tipo
     */
    window.abrirModalSeleccionarGanador = function(numero, callback) {
        // Validar parámetros
        numero = String(numero).trim();
        if (!numero || isNaN(numero)) {
            console.error('❌ Número inválido');
            return;
        }

        // Guardar estado
        ganadesoresModalNumero = numero;
        ganadesoresModalCallback = callback;

        // Verificar si el número ya es ganador
        const ganadorExistente = window.GanadoresManager.verificarGanador(numero);
        if (ganadorExistente) {
            alert(`⚠️  El número ${numero} ya es ganador de tipo "${ganadorExistente.tipo}"`);
            return;
        }

        // Actualizar UI
        document.getElementById('ganadesoresNumero').textContent = numero;

        // Generar opciones de tipos
        generarOpciones();

        // Mostrar modal
        const modal = document.getElementById('modalSeleccionarGanador');
        if (modal) {
            modal.classList.add('active');
        }
    };

    /**
     * Generar tarjetas con tipos de ganadores disponibles
     */
    function generarOpciones() {
        const contenedor = document.getElementById('tiposGanadores');
        contenedor.innerHTML = '';

        const config = window.GanadoresManager.getConfig();
        const ganadores = window.GanadoresManager.cargarGanadores();
        const tipos = ['sorteo', 'presorteo', 'ruletazos'];

        tipos.forEach(tipo => {
            const cantidad = config[tipo];
            const registrados = ganadores[tipo].length;
            const completo = registrados >= cantidad;

            const card = document.createElement('div');
            card.className = `tipo-ganador-card ${completo ? 'disabled' : ''}`;
            card.innerHTML = `
                <span class="tipo-ganador-icono">${window.GanadoresManager.getIconoTipo(tipo)}</span>
                <div class="tipo-ganador-nombre">${window.GanadoresManager.getEtiquetaTipo(tipo).split(' ')[1] || 'Ganador'}</div>
                <div class="tipo-ganador-contador"><span>${registrados}</span>/${cantidad}</div>
            `;

            if (!completo) {
                card.addEventListener('click', () => {
                    seleccionarTipo(tipo);
                });
            }

            contenedor.appendChild(card);
        });
    }

    /**
     * Procesar selección de tipo de ganador
     * @param {String} tipo - Tipo seleccionado
     */
    function seleccionarTipo(tipo) {
        if (!ganadesoresModalNumero || !tipo) {
            console.error('❌ Datos inválidos');
            return;
        }

        // Agregar ganador
        const resultado = window.GanadoresManager.agregarGanador(ganadesoresModalNumero, tipo);

        if (resultado.exito) {
            console.log('✅', resultado.mensaje);
            
            // Ejecutar callback si existe
            if (typeof ganadesoresModalCallback === 'function') {
                ganadesoresModalCallback(ganadesoresModalNumero, tipo, true);
            }

            // Mostrar feedback
            if (typeof mostrarFeedback === 'function') {
                mostrarFeedback(resultado.mensaje, 'exito');
            } else {
                alert(resultado.mensaje);
            }

            // Cerrar modal
            cerrarModalSeleccionarGanador();
        } else {
            console.error('❌', resultado.mensaje);
            if (typeof mostrarFeedback === 'function') {
                mostrarFeedback(resultado.mensaje, 'error');
            } else {
                alert(resultado.mensaje);
            }
        }
    }

    /**
     * Cerrar modal
     */
    function cerrarModalSeleccionarGanador() {
        const modal = document.getElementById('modalSeleccionarGanador');
        if (modal) {
            modal.classList.remove('active');
        }
        ganadesoresModalNumero = null;
        ganadesoresModalCallback = null;
    }

    // Event listeners del modal
    document.addEventListener('DOMContentLoaded', function() {
        const closeBtn = document.getElementById('closeModalGanador');
        const cancelBtn = document.getElementById('btnCancelarGanador');
        const modal = document.getElementById('modalSeleccionarGanador');

        if (closeBtn) {
            closeBtn.addEventListener('click', cerrarModalSeleccionarGanador);
        }

        if (cancelBtn) {
            cancelBtn.addEventListener('click', cerrarModalSeleccionarGanador);
        }

        if (modal) {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    cerrarModalSeleccionarGanador();
                }
            });
        }

        // Cerrar con ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && modal && modal.classList.contains('active')) {
                cerrarModalSeleccionarGanador();
            }
        });
    });
</script>
