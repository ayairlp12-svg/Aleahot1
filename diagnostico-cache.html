<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico - OportunidadesCacheManager</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: #f0f1f3;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0f172a;
            border-bottom: 3px solid #FF3D3D;
            padding-bottom: 10px;
        }
        .status {
            margin: 15px 0;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
        }
        .status.ok {
            background: #e8f5e9;
            border-left: 4px solid #10b981;
            color: #047857;
        }
        .status.error {
            background: #ffebee;
            border-left: 4px solid #ef4444;
            color: #991b1b;
        }
        .status.pending {
            background: #fff3cd;
            border-left: 4px solid #f59e0b;
            color: #92400e;
        }
        code {
            background: #f3f4f6;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #FF3D3D;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background: #cc2626;
        }
        .data-box {
            background: #f9fafb;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Diagnóstico OportunidadesCacheManager</h1>
        
        <div id="diagnostics"></div>
        
        <div class="grid">
            <button onclick="reloadStatus()">🔄 Recargar Estado</button>
            <button onclick="testCache()">🧪 Probar Cache</button>
            <button onclick="showInfo()">ℹ️ Mostrar Info</button>
            <button onclick="clearCache()">🗑️ Limpiar</button>
        </div>
    </div>

    <script>
        function createStatus(title, isOk, message, details = '') {
            const status = document.createElement('div');
            status.className = 'status ' + (isOk ? 'ok' : 'error');
            let html = `<strong>${isOk ? '✅' : '❌'} ${title}</strong>`;
            if (message) html += `<br>${message}`;
            if (details) html += `<div class="data-box"><pre>${details}</pre></div>`;
            status.innerHTML = html;
            return status;
        }

        function reloadStatus() {
            const diag = document.getElementById('diagnostics');
            diag.innerHTML = '';

            // Check 1: OportunidadesCacheManager class
            const hasClass = !!window.OportunidadesCacheManager;
            diag.appendChild(createStatus(
                'Clase OportunidadesCacheManager',
                hasClass,
                hasClass ? 'Clase disponible en window' : 'Clase NO encontrada'
            ));

            // Check 2: Instance
            const hasInstance = !!window.oportunidadesCache;
            diag.appendChild(createStatus(
                'Instancia oportunidadesCache',
                hasInstance,
                hasInstance ? 'Instancia creada correctamente' : 'Instancia NO existe',
                hasInstance ? JSON.stringify({
                    isInitialized: window.oportunidadesCache.isInitialized,
                    hasMemoey: !!window.oportunidadesCache.memoryCache,
                    memorySize: window.oportunidadesCache.memoryCache?.length || 0
                }, null, 2) : ''
            ));

            // Check 3: Boot flag
            const bootReady = window.oportunidadesCacheBootReady;
            diag.appendChild(createStatus(
                'Boot Sequence',
                bootReady,
                bootReady ? 'Boot completado' : 'Boot aún no completado'
            ));

            // Check 4: Global variables
            const hasGlobals = window.rifaplusOportunidadesLoaded;
            diag.appendChild(createStatus(
                'Variables Globales',
                hasGlobals,
                'rifaplusOportunidadesLoaded: ' + (window.rifaplusOportunidadesLoaded ? '✅' : '❌'),
                'Disponibles: ' + (window.rifaplusOportunidadesDisponibles?.length || 0)
            ));

            // Check 5: Data loaded
            const hasData = window.rifaplusOportunidadesDisponibles?.length > 0;
            diag.appendChild(createStatus(
                'Datos Cargados',
                hasData,
                hasData ? `${window.rifaplusOportunidadesDisponibles.length} números disponibles` : 'Sin datos'
            ));
        }

        function testCache() {
            if (!window.oportunidadesCache) {
                alert('❌ Cache no disponible');
                return;
            }
            
            console.log('🧪 Probando cache...');
            console.log('- obtenerTodos():', window.oportunidadesCache.obtenerTodos().length);
            console.log('- tieneNumero(123):', window.oportunidadesCache.tieneNumero(123));
            console.log('- obtenerEstado():', window.oportunidadesCache.obtenerEstado());
            
            alert('✅ Ver consola para resultados');
        }

        function showInfo() {
            const info = {
                userAgent: navigator.userAgent,
                url: window.location.href,
                windowKeys: Object.keys(window).filter(k => k.includes('oportunidad') || k.includes('Oportunidad')),
                cacheInfo: window.oportunidadesCache ? window.oportunidadesCache.obtenerEstado() : null
            };
            console.log('📊 Información:', info);
            alert('Información guardada en consola (F12)');
        }

        function clearCache() {
            if (confirm('¿Limpiar IndexedDB y localStorage?')) {
                try {
                    localStorage.clear();
                    indexedDB.deleteDatabase('RifaPlusDB');
                    alert('✅ Cache limpiado. Recarga la página.');
                } catch (e) {
                    alert('❌ Error: ' + e.message);
                }
            }
        }

        // Auto-reload on page load
        window.addEventListener('load', () => {
            setTimeout(reloadStatus, 500);
        });
    </script>
</body>
</html>
