<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Limpiar Storage</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }
        h1 { color: #333; }
        button {
            padding: 10px 20px;
            margin: 10px 5px 10px 0;
            background: #4ECDC4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2ba09f; }
        button.danger {
            background: #ff6b6b;
        }
        button.danger:hover {
            background: #ee5a52;
        }
        .log {
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 15px;
            margin: 10px 0;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-item {
            margin: 5px 0;
        }
        .success { color: #51cf66; }
        .warning { color: #ff922b; }
        .error { color: #ff6b6b; }
        .info { color: #339af0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Utilidad: Limpiar LocalStorage</h1>
        
        <p>El localStorage está lleno y está causando errores. Use los botones abajo para inspeccionarlo y limpiarlo.</p>
        
        <div>
            <button onclick="inspeccionar()">📊 Inspeccionar Storage</button>
            <button onclick="limpiarOportunidades()">🗑️ Limpiar Oportunidades</button>
            <button class="danger" onclick="limpiarTodo()">🔴 Limpiar TODO Storage</button>
        </div>
        
        <h2>Logs</h2>
        <div class="log" id="logs"></div>
    </div>

    <script>
        function log(mensaje, tipo = 'info') {
            const logsEl = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = `log-item ${tipo}`;
            div.textContent = mensaje;
            logsEl.appendChild(div);
            logsEl.scrollTop = logsEl.scrollHeight;
        }

        function inspeccionar() {
            document.getElementById('logs').innerHTML = '';
            log('🔍 Inspeccionando localStorage...', 'info');
            
            let totalSize = 0;
            const items = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                const value = localStorage.getItem(key);
                const sizeInMB = value ? (value.length / (1024 * 1024)).toFixed(3) : '0';
                const sizeInKB = value ? (value.length / 1024).toFixed(1) : '0';
                
                totalSize += value.length;
                
                const displaySize = sizeInMB > 0.01 ? `${sizeInMB}MB` : `${sizeInKB}KB`;
                items.push({ key, size: value.length, displaySize });
            }
            
            // Ordenar por tamaño (mayor primero)
            items.sort((a, b) => b.size - a.size);
            
            log(`\n📋 Total: ${items.length} items`, 'info');
            log(`💾 Tamaño total: ${(totalSize / (1024 * 1024)).toFixed(3)}MB\n`, 'warning');
            
            items.forEach(item => {
                const prefix = item.size > 1000000 ? '⚠️' : item.size > 100000 ? '⚡' : '📝';
                log(`${prefix} ${item.key}: ${item.displaySize}`, item.size > 1000000 ? 'error' : 'info');
            });
        }

        function limpiarOportunidades() {
            document.getElementById('logs').innerHTML = '';
            log('🗑️ Limpiando datos de oportunidades...', 'info');
            
            const toDelete = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && (key.includes('Oportunidad') || key.includes('oportunidad'))) {
                    toDelete.push(key);
                }
            }
            
            log(`Encontrados ${toDelete.length} items relacionados con oportunidades\n`, 'info');
            
            toDelete.forEach(key => {
                const value = localStorage.getItem(key);
                const sizeInMB = (value.length / (1024 * 1024)).toFixed(3);
                localStorage.removeItem(key);
                log(`✓ Borrado: ${key} (${sizeInMB}MB)`, 'success');
            });
            
            log(`\n✅ Limpieza completada. Eliminados ${toDelete.length} items.`, 'success');
            log('🔄 Ahora recarga la página (F5).', 'info');
        }

        function limpiarTodo() {
            if (!confirm('⚠️ ¿ESTÁ SEGURO? Esto eliminará TODO el localStorage (carrito, preferencias, etc.)')) {
                return;
            }
            
            document.getElementById('logs').innerHTML = '';
            log('🔴 LIMPIANDO TODO EL STORAGE...', 'error');
            
            const cantidad = localStorage.length;
            const items = [];
            for (let i = 0; i < cantidad; i++) {
                items.push(localStorage.key(i));
            }
            
            items.forEach(key => {
                localStorage.removeItem(key);
                log(`✓ Borrado: ${key}`, 'success');
            });
            
            log(`\n✅ LIMPIEZA TOTAL COMPLETADA. Se eliminaron ${items.length} items.`, 'success');
            log('🔄 Ahora recarga la página (F5).', 'warning');
        }

        // Inspeccionar automáticamente al cargar
        window.addEventListener('load', inspeccionar);
    </script>
</body>
</html>
